name: Web Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Web App
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build

      # TODO: Configure deployment target (Cloudflare Workers, VPS, etc.)
      # Update this step once the hosting strategy is finalized post-migration.
      - name: Deploy (placeholder)
        run: echo "Web deployment placeholder — configure hosting secrets to enable"
