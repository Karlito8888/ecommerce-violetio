name: Semgrep SAST

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'  # Weekly scan on Mondays at 6am UTC

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Security tab

jobs:
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Runs standalone scan with auto-selected rules, outputs SARIF
      # Optional: set SEMGREP_APP_TOKEN secret to enable Semgrep Cloud Platform integration
      - name: Run Semgrep scan
        run: semgrep scan --config=auto --sarif --output=semgrep.sarif .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true  # Report findings without blocking CI during initial rollout

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
