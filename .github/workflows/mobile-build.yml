name: Mobile Build

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check EXPO_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo '::notice::EXPO_TOKEN secret not configured — skipping mobile build'
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check-token.outputs.SKIP == 'false'
        uses: actions/checkout@v6

      # Node.js required for expo/expo-github-action and EAS CLI internals
      - name: Setup Node.js
        if: steps.check-token.outputs.SKIP == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        if: steps.check-token.outputs.SKIP == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        if: steps.check-token.outputs.SKIP == 'false'
        run: bun install --frozen-lockfile

      - name: Setup Expo and EAS
        if: steps.check-token.outputs.SKIP == 'false'
        uses: expo/expo-github-action@v8
        with:
          eas-version: "16.x"
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS Build
        if: steps.check-token.outputs.SKIP == 'false'
        working-directory: apps/mobile
        run: eas build --platform all --non-interactive --no-wait
